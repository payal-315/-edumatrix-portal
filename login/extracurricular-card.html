<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Extracurricular Summary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="extracurricular-card.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="animated-background">
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
    </div>

    <div class="container">
        <h1>Extracurricular Summary</h1>
        <div id="summaryContainer" class="cards-grid">
            <p id="loadingMessage" class="loading-message">Loading extracurricular activities...</p>
            <p id="noActivitiesMessage" class="no-activities-message" style="display: none;">No extracurricular activities found. Please add some!</p>
        </div>

        <button id="goBackBtn">Edit Details</button>
    </div>

    <script src="extracurricular-card.js"></script>
</body>
</html>
